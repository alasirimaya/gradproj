name: skillin_application
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.4
  file_picker: ^5.5.0
  url_launcher: ^6.3.1   # ADD THIS

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appIcon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png

  android: true
  ios: true
  web: false

  android_12:
    color: "#FFFFFF"
    image: assets/images/splash.png